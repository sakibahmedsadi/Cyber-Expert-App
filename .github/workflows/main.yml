name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git \
          wget \
          unzip \
          python3-pip \
          autoconf \
          automake \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libgdbm-dev \
          libnss3-dev \
          libssl-dev \
          libreadline-dev \
          libffi-dev \
          libsqlite3-dev \
          libbz2-dev \
          openjdk-17-jdk \
          ccache

    - name: Set JAVA_HOME
      run: echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

    - name: Install Cython and Buildozer
      run: |
        pip install --upgrade pip
        pip install cython==0.29.33
        pip install buildozer==1.5.0

    - name: Create buildozer.spec if not exists
      run: |
        if [ ! -f buildozer.spec ]; then
          buildozer init
          sed -i 's/^title = .*/title = CyberExpert/' buildozer.spec
          sed -i 's/^package.name = .*/package.name = cyberexpert/' buildozer.spec
          sed -i 's/^package.domain = .*/package.domain = com.sakib/' buildozer.spec
          sed -i 's/^requirements = .*/requirements = python3,kivy==2.1.0/' buildozer.spec
          sed -i 's/^android.permissions = .*/android.permissions = INTERNET/' buildozer.spec
          sed -i 's/^orientation = .*/orientation = portrait/' buildozer.spec
          sed -i 's/^fullscreen = .*/fullscreen = 1/' buildozer.spec
          sed -i 's/^android.api = .*/android.api = 30/' buildozer.spec
          sed -i 's/^android.minapi = .*/android.minapi = 21/' buildozer.spec
          sed -i 's/^android.ndk = .*/android.ndk = 23b/' buildozer.spec
          sed -i 's/^android.sdk = .*/android.sdk = 30/' buildozer.spec
        fi

    - name: Build with Buildozer
      run: |
        buildozer android debug
      env:
        LC_ALL: en_US.UTF-8

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: CyberExpert-APK
        path: bin/*.debug.apk
        if-no-files-found: error

    - name: Upload APK to Release (if tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
